 stroke="#D4C9BE" stroke-width="0.5" marker-end="url(#arr3)"/><line x1="81" y1="288" x2="102" y2="306" stroke="#D4C9BE" stroke-width="0.5" marker-end="url(#arr3)"/><line x1="176" y1="288" x2="155" y2="306" stroke="#D4C9BE" stroke-width="0.5" marker-end="url(#arr3)"/><line x1="176" y1="288" x2="197" y2="306" stroke="#D4C9BE" stroke-width="0.5" marker-end="url(#arr3)"/><line x1="271" y1="288" x2="250" y2="306" stroke="#D4C9BE" stroke-width="0.5" marker-end="url(#arr3)"/><line x1="271" y1="288" x2="292" y2="306" stroke="#D4C9BE" stroke-width="0.5" marker-end="url(#arr3)"/><circle cx="60" cy="312" r="5" fill="#E8F4F2" stroke="#1A7A6D" stroke-width="0.4"/><circle cx="102" cy="312" r="5" fill="#E8F4F2" stroke="#1A7A6D" stroke-width="0.4"/><circle cx="155" cy="312" r="5" fill="#E8F4F2" stroke="#1A7A6D" stroke-width="0.4"/><circle cx="197" cy="312" r="5" fill="#E8F4F2" stroke="#1A7A6D" stroke-width="0.4"/><circle cx="250" cy="312" r="5" fill="#E8F4F2" stroke="#1A7A6D" stroke-width="0.4"/><circle cx="292" cy="312" r="5" fill="#E8F4F2" stroke="#1A7A6D" stroke-width="0.4"/><text x="176" y="335" font-family="Inter, sans-serif" font-size="7.5" fill="#6B6155" text-anchor="middle">Independent studios and educators worldwide</text><rect x="56" y="348" width="240" height="24" rx="4" fill="#F0E8DD" stroke="#D4C9BE" stroke-width="0.5" stroke-dasharray="3 2"/><text x="176" y="364" font-family="Inter, sans-serif" font-size="8" fill="#6B6155" text-anchor="middle">PMA / NPCP — voluntary quality layer across all branches</text><rect x="44" y="384" width="264" height="100" rx="4" fill="#F0E8DD"/><text x="56" y="401" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#1A7A6D">What this means</text><text x="56" y="416" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Anyone can teach, make equipment, or open a studio</text><text x="56" y="430" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">No single authority controls the method or the name</text><text x="56" y="444" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Quality varies — voluntary certification exists</text><text x="56" y="458" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Extraordinary variety and accessibility</text><text x="56" y="474" font-family="Inter, sans-serif" font-size="8.5" fill="#1A7A6D" font-weight="500">Result: an open ecosystem with many voices</text><rect x="352" y="76" width="304" height="420" rx="6" fill="none" stroke="#C45B4D" stroke-width="0.8"/><rect x="352" y="76" width="304" height="28" rx="6" fill="#C45B4D"/><rect x="352" y="92" width="304" height="12" fill="#C45B4D"/><text x="504" y="96" font-family="Georgia, serif" font-size="11" font-weight="700" fill="#FAF5F0" text-anchor="middle">LAGREE — Proprietary IP</text><rect x="440" y="116" width="128" height="20" rx="10" fill="#FBEAE8" stroke="#C45B4D" stroke-width="0.5"/><text x="504" y="130" font-family="Inter, sans-serif" font-size="8.5" fill="#C45B4D" text-anchor="middle" font-weight="500">Trademarked system</text><rect x="444" y="148" width="120" height="32" rx="4" fill="#FBEAE8" stroke="#C45B4D" stroke-width="0.7"/><text x="504" y="162" font-family="Georgia, serif" font-size="9.5" fill="#C45B4D" text-anchor="middle" font-weight="700">Sebastien Lagree</text><text x="504" y="174" font-family="Inter, sans-serif" font-size="8" fill="#6B6155" text-anchor="middle">Founder, 1998</text><line x1="504" y1="180" x2="504" y2="196" stroke="#C45B4D" stroke-width="0.7" marker-end="url(#arr3)"/><rect x="434" y="198" width="140" height="26" rx="4" fill="#FBEAE8" stroke="#C45B4D" stroke-width="0.7"/><text x="504" y="215" font-family="Inter, sans-serif" font-size="9" fill="#C45B4D" text-anchor="middle" font-weight="500">Lagree Fitness (company)</text><line x1="470" y1="224" x2="408" y2="248" stroke="#C45B4D" stroke-width="0.7" marker-end="url(#arr3)"/><line x1="504" y1="224" x2="504" y2="248" stroke="#C45B4D" stroke-width="0.7" marker-end="url(#arr3)"/><li