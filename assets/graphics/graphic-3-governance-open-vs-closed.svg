ke="#C45B4D" stroke-width="0.6"/><path d="M498 362 V356 A6 6 0 0 1 510 356 V362" fill="none" stroke="#C45B4D" stroke-width="0.8"/><circle cx="504" cy="372" r="2" fill="#C45B4D"/><rect x="372" y="384" width="264" height="100" rx="4" fill="#F0E8DD"/><text x="384" y="401" font-family="Inter, sans-serif" font-size="9" font-weight="500" fill="#C45B4D">What this means</text><text x="384" y="416" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Only licensed studios can use the Lagree name</text><text x="384" y="430" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Equipment can only be bought from one source</text><text x="384" y="444" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Certification is centralized through the Academy</text><text x="384" y="458" font-family="Inter, sans-serif" font-size="8.5" fill="#2C2C2C">Standardization, but authority concentrated</text><text x="384" y="474" font-family="Inter, sans-serif" font-size="8.5" fill="#C45B4D" font-weight="500">Result: a closed platform with one voice</text></svg>
